
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json">


  <title>Inventario del Trastero</title>

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Inventario</p>
        <h1>Mi trastero</h1>
        <p class="subtitle">Busca, añade y organiza todo desde el móvil.</p>
      </div>

      <!-- Botón token GitHub -->
      <div class="topbar-actions">
        <button id="tokenBtn" class="icon-btn hidden" title="Configurar token GitHub">
          🔑
        </button>
      </div>
    </header>

    <!-- Buscador -->
    <section class="toolbar card glass">
      <label class="search-wrap">
        <span>🔎</span>
        <input
          id="searchInput"
          type="search"
          placeholder="Buscar por nombre, categoría, ubicación o notas"
        />
      </label>

      <div class="toolbar-meta">
        <span id="statsText">0 objetos</span>
        <span id="syncBadge" class="badge hidden">Solo lectura</span>
      </div>
      <button id="syncBtn">🔄 Sync</button>
    </section>

    <!-- Tarjetas -->
    <main>
      <section id="cardsContainer" class="cards"></section>

      <section id="emptyState" class="empty-state card hidden">
        <div>📦</div>
        <h2>No hay objetos todavía</h2>
        <p>Añade el primero con el botón +</p>
      </section>
    </main>
  </div>

  <!-- Botón flotante -->
  <button id="addBtn" class="fab">+</button>

  <!-- Modal -->
  <div id="itemModal" class="modal hidden">
    <div class="modal-backdrop" data-close="true"></div>

    <div class="modal-panel card">
      <div class="modal-header">
        <h2 id="modalTitle">Añadir objeto</h2>
        <button id="closeModalBtn">✕</button>
      </div>

      <form id="itemForm" class="form-grid">
        <input type="hidden" id="itemId" />

        <label>
          <span>Nombre</span>
          <input id="nameInput" required />
        </label>

        <label>
          <span>Categoría</span>
          <input id="categoryInput" required />
        </label>

        <label>
          <span>Ubicación</span>
          <input id="locationInput" required />
        </label>

        <label>
          <span>Notas</span>
          <textarea id="notesInput"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" id="cancelBtn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ✅ SCRIPT CORRECTO (IMPORTANTE) -->
  <!-- ✅ Le añadimos ?v=3 para evitar caché -->
  <!--<script src="app.github.js?v=3"></script> -->
  <script type="module" src="app.v2.js"></script>

</body>
</html>

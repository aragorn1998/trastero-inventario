<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Inventario del trastero con sincronización en GitHub" />
  <meta name="theme-color" content="#1f2937" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Inventario del Trastero</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="#mainContent" class="skip-link">Saltar al contenido</a>

  <header class="page-header">
    <div class="header-main">
      <!-- logo eliminado: usamos el botón de token como indicador coloreado -->
      <h1>📦 Inventario del Trastero</h1>
      <p class="subtitle">Consulta, busca y actualiza tus objetos guardados.</p>
    </div>

    <div class="header-actions">
      <button
        id="tokenBtn"
        type="button"
        title="Configurar token de GitHub"
        aria-label="Configurar token de GitHub"
      >
        ⚡
      </button>
    </div>
  </header>

  <section class="toolbar" aria-label="Herramientas de búsqueda y estado">
    <label class="search-group" for="searchInput">
      <span class="sr-only">Buscar en el inventario</span>
      <input
        id="searchInput"
        type="search"
        placeholder="Buscar por nombre..."
        autocomplete="off"
        spellcheck="false"
        aria-describedby="statsText syncBadge"
      />
    </label>

    <div class="toolbar-controls">
      <label class="visually-hidden" for="categoryFilter">Filtrar por categoría</label>
      <input id="categoryFilter" list="categoryList" placeholder="Filtrar por categoría (escribe para buscar)" aria-label="Filtrar por categoría" />
      <button id="categoryClear" class="clear-btn" aria-label="Limpiar filtro de categoría">✕</button>
      <datalist id="categoryList"></datalist>

      <label class="visually-hidden" for="sortSelect">Ordenar</label>
      <select id="sortSelect" aria-label="Ordenar">
        <option value="newest">Más recientes</option>
        <option value="name-asc">Nombre A→Z</option>
        <option value="name-desc">Nombre Z→A</option>
        <option value="category-asc">Categoría A→Z</option>
        <option value="category-desc">Categoría Z→A</option>
        <option value="location-asc">Ubicación A→Z</option>
      </select>
    </div>

    <div class="status-row" role="status" aria-live="polite">
      <span id="statsText">0 objetos</span>
      <span id="syncBadge">Solo lectura</span>
    </div>
  </section>

  <main id="mainContent">
    <section aria-label="Listado de objetos">
      <div id="cardsContainer"></div>

      <div id="emptyState" class="hidden" role="status" aria-live="polite">
        <p>No hay objetos todavía.</p>
        <p>Añade el primero con el botón +.</p>
      </div>
    </section>
  </main>

  <button
    id="addBtn"
    type="button"
    aria-label="Añadir objeto"
    title="Añadir objeto"
  >
    +
  </button>

  <!-- Modal -->
  <div
    id="itemModal"
    class="hidden"
    data-close="true"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <div class="modal-card" role="document">
      <div class="modal-header">
        <h2 id="modalTitle">Añadir objeto</h2>
        <button
          id="closeModalBtn"
          type="button"
          class="icon-btn"
          aria-label="Cerrar ventana"
          title="Cerrar"
        >
          ✕
        </button>
      </div>

      <form id="itemForm" novalidate class="form-grid">
        <input type="hidden" id="itemId" />

        <label for="nameInput" class="half-field">
          Nombre
          <input id="nameInput" name="name" required maxlength="120" />
        </label>

        <label for="categoryInput" class="half-field">
          Categoría
          <input id="categoryInput" name="category" required maxlength="80" />
        </label>

        <label for="locationInput" class="half-field">
          Ubicación
          <input id="locationInput" name="location" required maxlength="120" />
        </label>

        <div class="image-field">
          <div class="image-field-header">
            <label for="imageInput">Imagen del producto</label>
            <span class="field-help">Opcional. Elige un archivo o usa la cámara.</span>
          </div>
          <input id="imageInput" name="imageInput" type="file" accept="image/*" capture="environment" />
          <input type="hidden" id="imageData" name="imageData" />

          <div id="imagePreviewWrapper" class="image-preview-wrapper hidden">
            <img id="imagePreview" class="image-preview" alt="Vista previa de imagen del producto" />
            <button id="clearImageBtn" type="button" class="clear-btn" aria-label="Eliminar imagen">✕</button>
          </div>
        </div>

        <label for="notesInput" class="notes-field">
          Notas
          <textarea id="notesInput" name="notes" rows="4" maxlength="1000"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" id="cancelBtn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <noscript>
    <div class="noscript-warning">
      Esta app necesita JavaScript para funcionar correctamente.
    </div>
  </noscript>

  <!-- Script principal -->
  <script src="app.github.js?v=6"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario del Trastero</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>📦 Inventario del Trastero</h1>

    <div class="header-actions">
      <button id="tokenBtn" class="hidden">🔑</button>
    </div>
  </header>

  <!-- BUSCADOR -->
  <section>
    <input
      id="searchInput"
      type="text"
      placeholder="Buscar..."
    />

    <div>
      <span id="statsText">0 objetos</span>
      <span id="syncBadge">Solo lectura</span>
    </div>
  </section>

  <!-- LISTADO -->
  <main>
    <div id="cardsContainer"></div>

    <div id="emptyState" class="hidden">
      <p>No hay objetos todavía</p>
      <p>Añade el primero con el botón +</p>
    </div>
  </main>

  <!-- BOTÓN AÑADIR -->
  <button id="addBtn">+</button>

  <!-- MODAL -->
  <div id="itemModal" class="hidden">
    <div>
      <h2 id="modalTitle">Añadir objeto</h2>

      <form id="itemForm">
        <input type="hidden" id="itemId" />

        <label>
          Nombre
          <input id="nameInput" required />
        </label>

        <label>
          Categoría
          <input id="categoryInput" required />
        </label>

        <label>
          Ubicación
          <input id="locationInput" required />
        </label>

        <label>
          Notas
          <textarea id="notesInput"></textarea>
        </label>

        <div>
          <button type="button" id="cancelBtn">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ✅ SCRIPT CORRECTO -->
  <script src="app.github.js"></script>

</body>
</html>
